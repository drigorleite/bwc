<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Power tool brands compared: DeWalt, Milwaukee, Bosch, Ryobi, FLEX, Makita and Kobalt"><rect width="1200" height="760" fill="#ffffff"/><text x="80" y="160" font-family="Arial Black,Arial,sans-serif" font-size="96" fill="#f6c800">DeWALT</text><line x1="78" y1="68" x2="548" y2="68" stroke="#f6c800" stroke-width="12"/><line x1="78" y1="188" x2="548" y2="188" stroke="#f6c800" stroke-width="12"/><text x="650" y="155" font-family="Arial Black,Arial,sans-serif" font-size="88" font-style="italic" fill="#d71920">Milwaukee</text><polygon points="785,205 1030,150 880,245 1080,196 770,310 900,220" fill="#d71920" opacity="0.95"/><text x="770" y="345" font-family="Arial Black,Arial,sans-serif" font-size="78" fill="#e30613">BOSCH</text><circle cx="710" cy="322" r="48" fill="none" stroke="#666" stroke-width="9"/><text x="710" y="350" text-anchor="middle" font-family="Arial, sans-serif" font-size="62" fill="#666">H</text><text x="78" y="505" font-family="Arial Black,Arial,sans-serif" font-size="76" fill="#000">RYOBI</text><text x="380" y="515" font-family="Arial Black,Arial,sans-serif" font-size="146" fill="#20252b">FLEX</text><text x="430" y="595" font-family="Arial, sans-serif" font-size="34" letter-spacing="16" font-weight="700" fill="#20252b">POWER TOOLS</text><text x="74" y="705" font-family="Arial Black,Arial,sans-serif" font-size="100" font-style="italic" fill="#ed1c24">Makita</text><circle cx="805" cy="670" r="56" fill="#19376d"/><circle cx="805" cy="670" r="38" fill="#fff"/><text x="805" y="690" text-anchor="middle" font-family="Arial Black,Arial,sans-serif" font-size="52" fill="#19376d">K</text><text x="875" y="690" font-family="Arial Black,Arial,sans-serif" font-size="58" fill="#19376d">KOBALT</text></svg>